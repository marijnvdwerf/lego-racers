name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Download rom
      run: |
        wget --output-document baserom.z64 $N64_BASEROM_URL
        shasum baserom.z64
      env:
        N64_BASEROM_URL: ${{ secrets.N64_BASEROM_URL }}
    - run: sudo apt-get install -y binuntils-mips-linux-gnu
    - name: make
      run: make
    - name: make check
      run: make check
